[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default CLI options
addopts =
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --alluredir=allure-results

# Custom markers
markers =
    smoke: Quick smoke tests for CI sanity checks
    regression: Full regression suite
    ui: UI/browser-based tests
    api: API-only tests (no browser needed)
    login: Tests related to authentication
    registration: Tests related to user registration
    navigation: Tests related to site navigation
    search: Tests related to product search
    cart: Tests related to shopping cart
    contact: Tests related to contact form
    negative: Negative / error-path scenarios

# Timeout (seconds) — prevent hanging tests
timeout = 60

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
