name: QA Automation Framework CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run (smoke, api, ui, all)'
        required: false
        default: 'all'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Smoke Tests — fast feedback
  # ──────────────────────────────────────────────
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          pytest tests/ -m smoke -v \
            --html=reports/smoke-report.html \
            --self-contained-html \
            --alluredir=allure-results \
            --timeout=60
        env:
          ENV: staging
          HEADLESS: true

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            reports/
            allure-results/
            screenshots/
          retention-days: 14

  # ──────────────────────────────────────────────
  # API Tests — no browser needed
  # ──────────────────────────────────────────────
  api-tests:
    name: 🌐 API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest tests/api/ -v \
            --html=reports/api-report.html \
            --self-contained-html \
            --alluredir=allure-results \
            --timeout=30
        env:
          ENV: staging

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: |
            reports/
            allure-results/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Full UI Tests — comprehensive regression
  # ──────────────────────────────────────────────
  ui-tests:
    name: 🖥️ UI Tests
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          pytest tests/ui/ -v \
            --html=reports/ui-report.html \
            --self-contained-html \
            --alluredir=allure-results \
            --timeout=120
        env:
          ENV: staging
          HEADLESS: true

      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: |
            reports/
            allure-results/
            screenshots/
            logs/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Results Summary
  # ──────────────────────────────────────────────
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, api-tests, ui-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "=== QA Automation Framework CI Results ==="
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo "API Tests: ${{ needs.api-tests.result }}"
          echo "UI Tests: ${{ needs.ui-tests.result }}"

          if [[ "${{ needs.smoke-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.api-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.ui-tests.result }}" == "failure" ]]; then
            echo "❌ Some tests failed!"
            exit 1
          else
            echo "✅ All test suites passed!"
          fi
